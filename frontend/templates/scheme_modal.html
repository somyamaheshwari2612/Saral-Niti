<!-- ══════════════ SCHEME DETAIL MODAL ══════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-category" id="modalCategory"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-ministry" id="modalMinistry"></div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">About this Scheme</div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Benefits</div>
        <div class="benefit-box" id="modalBenefits"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Eligibility</div>
        <div class="eligibility-grid" id="modalEligibility"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Tags</div>
        <div class="tags-wrap" id="modalTags"></div>
      </div>
    </div>
    <div class="modal-footer">
      <a href="#" id="modalApplyBtn" target="_blank" class="btn-primary">Apply Now →</a>
      <button class="btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>
